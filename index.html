<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🏆 Game of Doors – Regional Conquest</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--gold:#facc15;
--orange:#fb923c;
--soft:#cbd5f5;
--card:rgba(0,0,0,0.65);
}

body{
margin:0;
font-family:'Poppins',sans-serif;
color:#fff;
background:url('background.jpg') center/cover no-repeat fixed;
}

body::before{
content:"";
position:fixed;
inset:0;
background:linear-gradient(to bottom,rgba(0,0,0,0.75),rgba(0,0,0,0.9));
z-index:-1;
}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

/* TITLE */

h1{
text-align:center;
font-size:30px;
font-weight:800;
margin-bottom:35px;
background:linear-gradient(90deg,var(--gold),var(--orange));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* TOPPER CARDS */

.topper-section{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:30px;
}

.topper-card{
background:var(--card);
padding:20px;
border-radius:14px;
text-align:center;
box-shadow:0 0 20px rgba(250,204,21,0.2);
}

.topper-title{
font-size:12px;
letter-spacing:1px;
color:var(--soft);
margin-bottom:6px;
text-transform:uppercase;
}

.topper-name{
font-size:20px;
font-weight:700;
color:var(--gold);
}

/* TABS */

.tabs{
display:flex;
justify-content:center;
gap:15px;
margin-bottom:30px;
flex-wrap:wrap;
}

.tab-btn{
padding:10px 18px;
border-radius:40px;
border:none;
background:rgba(0,0,0,0.6);
color:white;
cursor:pointer;
font-size:14px;
}

.tab-btn.active,
.tab-btn:hover{
background:linear-gradient(90deg,var(--gold),var(--orange));
color:black;
font-weight:600;
}

/* SECTION */

.section{
display:none;
background:var(--card);
border-radius:16px;
padding:25px;
margin-bottom:35px;
}

.section.active{
display:block;
}

.section h2{
color:var(--gold);
margin-bottom:15px;
font-size:16px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th{
font-size:12px;
color:var(--soft);
text-align:left;
padding:10px 0;
border-bottom:1px solid rgba(255,255,255,0.1);
}

td{
padding:10px 0;
font-size:14px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

/* TOP 5 */

.top5{
background:rgba(250,204,21,0.12);
font-weight:600;
}

.top5 td:first-child::before{
content:"🏅 ";
}

/* TEAM GRID */

.team-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:20px;
margin-top:20px;
}

.team-card{
background:rgba(0,0,0,0.6);
border-radius:14px;
padding:18px;
}

/* GROUP WINNER */

.top-team{
background:linear-gradient(90deg,rgba(250,204,21,0.35),rgba(251,146,60,0.35));
font-weight:700;
}

.top-team td:first-child::before{
content:"🥇 ";
}

/* PROGRESS */

.progress{
height:4px;
background:rgba(255,255,255,0.1);
border-radius:4px;
margin-top:5px;
}

.bar{
height:100%;
background:linear-gradient(90deg,var(--gold),var(--orange));
}

/* FOOTER */

.footer{
text-align:center;
font-size:12px;
color:#cbd5e1;
margin-top:50px;
border-top:1px solid rgba(255,255,255,0.1);
padding-top:20px;
}

.footer a{
color:var(--gold);
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h1>🏆 Game of Doors – Regional Conquest</h1>

<div class="topper-section" id="topperSection"></div>

<div class="tabs">
<button class="tab-btn active" onclick="showTab('sales',this)">Sales</button>
<button class="tab-btn" onclick="showTab('trainers',this)">Trainers</button>
<button class="tab-btn" onclick="showTab('team',this)">Team</button>
</div>

<div id="sales" class="section active">

<h2>Sales Ranking</h2>

<table>
<thead>
<tr>
<th>Rank</th>
<th>Name</th>
<th>Score</th>
</tr>
</thead>

<tbody id="salesTable"></tbody>

</table>

</div>

<div id="trainers" class="section">

<h2>Trainers Ranking</h2>

<table>
<thead>
<tr>
<th>Rank</th>
<th>Name</th>
<th>Score</th>
</tr>
</thead>

<tbody id="trainerTable"></tbody>

</table>

</div>

<div id="team" class="section">

<h2>Team Groups</h2>

<div class="team-grid" id="teamTable"></div>

</div>

<div class="footer">

<div>
For data discrepancy contact  
<a href="mailto:manshu@streamlineservicesindia.com">manshu@streamlineservicesindia.com</a>
</div>

<div>
Technical support  
<a href="mailto:itsupport@streamlineservicesindia.com">itsupport@streamlineservicesindia.com</a>
</div>

<div>
© 2026 Game of Doors | Designed & Developed by Tahir
</div>

</div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbzuNcrwlYlvNNRg67uOIX0_7stDVRDksNW21RvflFEkovZj_HMCcnhpkHiRem6CUF4/exec";

async function fetchData(){
const res=await fetch(API_URL);
const data=await res.json();
renderAll(data);
}

function renderAll(data){

const sales=data.filter(d=>d.Role==="Sales").sort((a,b)=>b.Score-a.Score);
const trainers=data.filter(d=>d.Role==="Trainer").sort((a,b)=>b.Score-a.Score);

renderTable(sales,"salesTable","Employee",true);
renderTable(trainers,"trainerTable","Employee",true);

renderTeamGroups(sales);
renderToppers(sales,trainers);

}

function renderToppers(sales,trainers){

const topSales=sales[0]?.Employee || "-";
const topTrainer=trainers[0]?.Employee || "-";

document.getElementById("topperSection").innerHTML=`

<div class="topper-card">
<div class="topper-title">Top Sales</div>
<div class="topper-name">${topSales}</div>
</div>

<div class="topper-card">
<div class="topper-title">Top Trainer</div>
<div class="topper-name">${topTrainer}</div>
</div>

`;

}

function renderTable(data,id,key,highlightTop5=false){

const table=document.getElementById(id);
const max=data.length>0?data[0].Score:1;

let html="";

data.forEach((row,i)=>{

html+=`
<tr class="${highlightTop5 && i<5 ? 'top5' : ''}">
<td>${i+1}</td>
<td>${row[key]}</td>
<td>${row.Score}
<div class="progress">
<div class="bar" style="width:${(row.Score/max)*100}%"></div>
</div>
</td>
</tr>
`;

});

table.innerHTML=html;

}

function renderTeamGroups(sales){

const groups={
"Group 1":["North Super Kings","North Super Champions","Royal Rangers"],
"Group 2":["Mumbai Rising Stars","Paschim Ke Sher","Rajasthan Super Giants"],
"Group 3":["East Warriors","The Southern Cartel","Southern Legends"]
};

let html="";

for(const group in groups){

const teamMap={};

sales.forEach(r=>{
if(groups[group].includes(r.Team)){
teamMap[r.Team]=(teamMap[r.Team]||0)+r.Score;
}
});

const teams=Object.keys(teamMap)
.map(t=>({Team:t,Score:teamMap[t]}))
.sort((a,b)=>b.Score-a.Score);

html+=`<div class="team-card">
<h2>${group}</h2>

<table>
<thead>
<tr>
<th>Rank</th>
<th>Team</th>
<th>Score</th>
</tr>
</thead>

<tbody>`;

teams.forEach((t,i)=>{

html+=`
<tr class="${i===0?'top-team':''}">
<td>${i+1}</td>
<td>${t.Team}</td>
<td>${t.Score}</td>
</tr>
`;

});

html+=`</tbody></table></div>`;

}

document.getElementById("teamTable").innerHTML=html;

}

function showTab(id,btn){

document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));

document.getElementById(id).classList.add("active");
btn.classList.add("active");

}

fetchData();

</script>

</body>
</html>
